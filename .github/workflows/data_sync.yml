name: Daily Mutual Fund Data Sync

on:
  schedule:
    # 10 AM everyday (IST is UTC + 5:30, so 10 AM IST is 4:30 AM UTC)
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright chromadb apscheduler
          playwright install chromium

      - name: Run Sync Job
        run: python3 phase5/scheduler.py --once

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add phase1/fund_data.json phase2/chroma_db/
          git commit -m "Automated Data Sync: $(date)" || echo "No changes to commit"
          git push
